name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
      - run: npm ci
      - run: npm run build
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
        with:
          branch: main
          folder: ./dist
